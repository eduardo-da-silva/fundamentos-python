site_name: Fundamentos de Python
site_author: Eduardo da Silva
site_description: Curso prático de Python com foco em manipulação de dados e preparação para backend — 80 horas
site_url: https://eduardo-da-silva.github.io/fundamentos-python
repo_url: https://github.com/eduardo-da-silva/fundamentos-python
repo_name: eduardo-da-silva/fundamentos-python
copyright: Copyright &copy; 2026 Eduardo da Silva

plugins:
  - search:
      lang:
        - pt
        - en
      separator: '[\s\-,:!=\[\]()"/]+|(?!\b)(?=[A-Z][a-z])|\.(?!\d)|&[lg]t;'

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/eduardo-da-silva
      name: GitHub
    - icon: fontawesome/brands/linkedin
      link: https://linkedin.com/in/eduardo-da-silva
      name: LinkedIn
  generator: false

theme:
  name: material
  language: pt-BR
  features:
    - announce.dismiss
    - content.code.annotate
    - content.code.copy
    - content.code.select
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    # Modo claro — azul Python
    - scheme: default
      primary: blue
      accent: yellow
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    # Modo escuro
    - scheme: slate
      primary: blue
      accent: yellow
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  font:
    text: Roboto
    code: Roboto Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Início: index.md
  - Aulas:
    - aulas/index.md
    - Aula 01 — Introdução prática ao Python: aulas/aula-01-introducao.md
    - Aula 02 — Manipulação de dados: aulas/aula-02-manipulacao-dados.md
    - Aula 03 — Leitura de arquivos: aulas/aula-03-leitura-arquivos.md
    - Aula 04 — Validação de dados: aulas/aula-04-validacao.md
    - Aula 05 — Transformação de dados: aulas/aula-05-transformacao.md
  - Projeto — DataProcessor CLI:
    - projeto/index.md
  - Datasets:
    - datasets/index.md
